name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: uv run python -m pytest tests/ -v --tb=short -x

      - name: Smoke test (no network required)
        run: uv run python -c "
from mcp_manager.server import server
import asyncio
async def test():
    tools = await server.list_tools()
    print(f'{len(tools)} tools registered')
    for t in sorted(tools, key=lambda x: x.name):
        assert t.description, f'{t.name} has no description'
    print('All tools have descriptions')
    assert len(tools) == 11, f'Expected 11 tools, got {len(tools)}'
    print('Tool count OK')
asyncio.run(test())
"

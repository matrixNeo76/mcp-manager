name: Stale
on:
  schedule:
    - cron: "0 8 * * 1"  # ogni lunedi alle 8 UTC

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: "This issue has been inactive for 60 days. Remove the stale label or comment to keep it open."
          stale-pr-message: "This PR has been inactive for 30 days. Remove the stale label or comment to keep it open."
          close-issue-message: "Closing this issue due to inactivity. Feel free to reopen if needed."
          close-pr-message: "Closing this PR due to inactivity. Feel free to reopen if needed."
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-issue-close: 14
          days-before-pr-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
